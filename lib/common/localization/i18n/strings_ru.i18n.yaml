fromDeveloper:
  greeting: Привет!
  intro: Меня зовут Артур, и я рад, что вы пользуетесь приложением CardHolder.
  freeOpenSource: Это приложение всегда будет оставаться бесплатным и с открытым исходным кодом.
  sourceCode: Посмотреть исходный код можно здесь
  feedback: Буду рад, если вы оставите комментарий на платформе, где его скачали. Также я всегда открыт для предложений по улучшению или ухудшению приложения.
  questions: Я старался сделать приложение интуитивно понятным, но иногда могут возникнуть вопросы.
  instruction: Инструкция
  addCardTitle: Добавление карты
  addCardDescription1: На главной странице вы увидите кнопку «Плюс» — с её помощью можно добавить карту.
  addCardDescription2: После нажатия откроется меню с вариантами
  addCardOption1: создать карту с нуля;
  addCardOption2: использовать готовый шаблон;
  addCardOption3: добавить карту из файла.
  addCardDescription3: Создание с нуля или использование шаблона — простой процесс, и у вас не возникнет трудностей добавить карту этим способом.
  addCardDescription4: Добавить карту из файла можно просто открыв файл, которым с вами поделились, через данное приложение
  shareCardsTitle: Обмен картами
  shareCardsDescription1: Если у вас есть друзья (они же есть, правда?), вы можете обмениваться картами с ними.
  shareCardsDescription2: На экране добавленной карты есть кнопка «Поделиться». Нажмите её, выберите отправку файла и отправьте его куда угодно — в мессенджер, почту или другое приложение, которое всё ещё доступно.
  shareCardsDescription3: Ваш товарищь сможет скачать его и добавить карту через функцию добавления карты из файла, о которой говорилось выше.
  shareCardsDescription4: Также карточкой можно поделиться в виде фото. Да, тут можно заметить, что... А кто мне мешает сделать скриншот? Согласен, но кто мне мешает сделать такую функцию?
  settingsSectionTitle: Раздел «Настройки»
  settingsSectionDescription1: В разделе «Настройки» есть карточка «Поделиться».
  settingsSectionDescription2: Там можно
  settingsSectionOption1: поделиться ссылкой на приложение;
  settingsSectionOption2: поделиться сразу всеми своими картами.
  settingsSectionDescription3: Функцию «поделиться всеми картами» также можно использовать как удобный способ перенести карты на новое устройство.
  sourceCodeLink: https://github.com/GingerMustache/card_holder
  title: от разработчика


