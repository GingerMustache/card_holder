fromDeveloper:
  greeting: Hey there!
  intro: My name is Artur, and I'm glad you're using the CardHolder app.
  freeOpenSource: This app will always remain free and open source.
  sourceCode: You can view the source code here
  feedback: I'd appreciate it if you leave a comment on the platform where you downloaded it. I'm also always open to suggestions for improving or worsening the app.
  questions: I tried to make the app intuitive, but sometimes questions may arise.
  instruction: Instructions
  addCardTitle: Adding a card
  addCardDescription1: On the main page, you'll see a "Plus" button – you can use it to add a card.
  addCardDescription2: After clicking, a menu will open with options
  addCardOption1: create a card from scratch;
  addCardOption2: use a ready-made template;
  addCardOption3: add a card from a file.
  addCardDescription3: Creating from scratch or using a template is a simple process, and you won't have any trouble adding a card this way.
  addCardDescription4: You can add a card from a file by simply opening the file shared with you through this application.
  shareCardsTitle: Sharing cards
  shareCardsDescription1: If you have friends (you do, right?), you can exchange cards with them.
  shareCardsDescription2: On the added card screen, there's a "Share" button. Click it, choose to send the file, and send it anywhere – to a messenger, email, or another app that's still available.
  shareCardsDescription3: Your friend will be able to download it and add the card using the "add card from file" function mentioned above.
  shareCardsDescription4: You can also share the card as a photo. Yes, you might notice that... "Who's stopping me from taking a screenshot?" I agree, but who's stopping me from making such a function?
  settingsSectionTitle: Settings section
  settingsSectionDescription1: In the "Settings" section, there's a "Share" card.
  settingsSectionDescription2: There you can
  settingsSectionOption1: share a link to the app;
  settingsSectionOption2: share all your cards at once.
  settingsSectionDescription3: The "share all cards" function can also be used as a convenient way to transfer cards to a new device.
  sourceCodeLink: https://github.com/GingerMustache/card_holder
  title: From developer

